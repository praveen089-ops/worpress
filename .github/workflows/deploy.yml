name: DEV Cpcloud Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy WordPress
        run: |
          # Ensure you are in the correct directory
          cd /var/www/dev.cpcloud.in/public_html

          # Copy files to the server
          scp -o StrictHostKeyChecking=no -r . ${{ secrets.YOUR_SSH_USER }}@${{ secrets.YOUR_SERVER_IP }}:/var/www/dev.cpcloud.in/public_html

          # Any additional commands to finalize the deployment
          # For example, running database migrations or flushing caches
          #ssh -o StrictHostKeyChecking=no ${{ secrets.YOUR_SSH_USER }}@${{ secrets.YOUR_SERVER_IP }} 'cd /var/www/dev.cpcloud.in/public_html && wp core update-db && wp cache flush'
